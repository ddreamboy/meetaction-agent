services:
  app:
    build: .
    ports:
      - "7007:7007"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./logs:/app/logs

  ui:
    build: .
    command: ["python", "-m", "app.ui"]
    ports:
      - "7860:7860"
    environment:
      API_BASE_URL: http://app:7007
      UI_PORT: "7860"
    depends_on:
      app:
        condition: service_started

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
